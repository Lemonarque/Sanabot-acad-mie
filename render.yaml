services:
  - type: web
    name: sanabot-web
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /healthz.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug
      - key: FILESYSTEM_DISK
        value: public
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: sanabot-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sanabot-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sanabot-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sanabot-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sanabot-db
          property: password
      - key: FEDAPAY_PUBLIC_KEY
        sync: false
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_ENVIRONMENT
        value: live
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false

databases:
  - name: sanabot-db
    plan: free
    databaseName: sanabot
    user: sanabot
